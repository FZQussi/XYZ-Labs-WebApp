# nginx.conf CORRETO:
server {
    listen 80;
    server_name localhost;

    client_max_body_size 100M;
    root /usr/share/nginx/html;

    location = / {
        return 301 /PaginaFrontal/html/HomePage.html;
    }

    location = /index.html {
        return 301 /PaginaFrontal/html/HomePage.html;
    }

    # ← LINHA 23 ATUALIZADA (adiciona |filters):
    location ~ ^/(auth|admin|products|users|categories|orders|contact|forgot-password|reset-password|api|filters|images|models) {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /PaginaFrontal/html/HomePage.html;
    }
}