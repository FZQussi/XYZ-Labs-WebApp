server {
    listen 80;
    server_name localhost;

    # ===== LIMITE DE TAMANHO DE UPLOAD =====
    client_max_body_size 100M;  # Permite uploads de até 100MB

    # Serve os ficheiros estáticos do frontend (pasta raiz do Frontend/)
    root /usr/share/nginx/html;

    # ===== REDIRECT DA RAIZ PARA A HOMEPAGE =====
    # Quando acessa / ou /index.html, redireciona para a homepage real
    # Isto faz o browser atualizar a URL, resolvendo problemas com caminhos relativos
    location = / {
        return 301 /PaginaFrontal/html/HomePage.html;
    }

    location = /index.html {
        return 301 /PaginaFrontal/html/HomePage.html;
    }

    # Proxy das chamadas às rotas do backend para o container Node.js
    location ~ ^/(auth|admin|products|users|categories|orders|contact|forgot-password|reset-password|api|images|models) {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        
        # ===== TIMEOUT PARA UPLOADS GRANDES =====
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Fallback — devolve a homepage para rotas desconhecidas
    # (para quando os utilizadores digitam URLs que não existem)
    location / {
        try_files $uri $uri/ /PaginaFrontal/html/HomePage.html;
    }
}